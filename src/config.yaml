# general configurations
seed: 42
data_dir: "cifar10"
archive_name: "cifar-10-python.tar.gz"
data_url: "https://www.cs.toronto.edu/~kriz/cifar-10-python.tar.gz"
download_keep_archive: true
dataset_registry_path: "dataset_registry.csv"
eval_metrics_path: "metrics/evaluation_metrics.json"
model_dir: "models"
val_ratio: 0.2
train_data_ratio: 0.5
device: "cpu"  # "cuda" or "cpu"

# training configurations
batch_size: 128
epochs: 10
lr: 0.001
patience: 5

# model configurations
model_name: "regnet_y_400mf"
num_classes: 10
# MLflow settings (optional)
mlflow_experiment: "default"
# mlflow_tracking_uri: "file:./mlruns"  # override to remote tracking server
# run_name: "Experiment 1 - Stage 2: Model Training"
